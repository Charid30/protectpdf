<header class="bg-gray-900 shadow-lg">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
    <a routerLink="/" class="flex items-center gap-2">
      <svg class="w-7 h-7 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
      </svg>
      <span class="text-xl font-bold tracking-tight">
        <span class="text-white">SecurPDF</span><span class="text-green-500">BF</span>
      </span>
    </a>
    <nav class="flex gap-6">
      <a routerLink="/" routerLinkActive="text-green-400" [routerLinkActiveOptions]="{exact: true}"
         class="text-gray-300 hover:text-green-400 font-medium text-sm transition-colors">
        Accueil
      </a>
      <a routerLink="/proteger" routerLinkActive="text-green-400"
         class="text-gray-300 hover:text-green-400 font-medium text-sm transition-colors">
        Sécuriser un PDF
      </a>
    </nav>
  </div>
</header>
